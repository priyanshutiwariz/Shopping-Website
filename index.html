<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore | Live Demo</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: #fff;
            text-align: center;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #7dd3fc;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            color: #cbd5f5;
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            text-decoration: none;
            background: #7dd3fc;
            color: #020617;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #38bdf8;
            transform: translateY(-2px);
        }

        .link {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .link a {
            color: #7dd3fc;
            text-decoration: none;
        }

        .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>TechStore</h1>
        <p>A modern full-stack eCommerce website built with PHP & MySQL.</p>

        <a href="https://priyanshushop.gt.tc" target="_blank" class="btn">
            🚀 View Live Website
        </a>

        <div class="link">
            <p>Live URL: <a href="https://priyanshushop.gt.tc" target="_blank">priyanshushop.gt.tc</a></p>
        </div>
    </div>

</body>
</html>
